name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "core/**"
      - "ui/**"
      - "platform_services/**"
      - "assets/**"
      - "buildozer.spec"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Kivy 官方 Action，内部用预配置好的 Docker 镜像运行 buildozer
      # 镜像已包含 Android SDK / NDK / Java / Gradle，无需手动安装
      - name: Build APK (official kivy/buildozer-action)
        uses: kivy/buildozer-action@master
        with:
          command: buildozer -v android debug
          repository_root: .

      # 上传产物（APK 文件）
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: doushouqi-debug-apk
          path: bin/*.apk
          if-no-files-found: warn

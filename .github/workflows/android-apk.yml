name: Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "main.py"
      - "core/**"
      - "ui/**"
      - "platform_services/**"
      - "assets/**"
      - "buildozer.spec"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Buildozer system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev automake

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer==1.5.0 setuptools cython==0.29.34

      - name: Pre-accept Android SDK licenses
        run: |
          # Create fake license files so buildozer's sdkmanager doesn't prompt
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          printf "\n8933bad161af4178b1185d1e6fbd5e7a16abbf5a" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "\n84831b9409646a918e30573f8b7d47d9b3ad9f9" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      - name: Build debug APK
        run: |
          buildozer android debug

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            bin/*.apk
            bin/*.aab
          if-no-files-found: error

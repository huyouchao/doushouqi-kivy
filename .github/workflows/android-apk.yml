name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "core/**"
      - "ui/**"
      - "platform_services/**"
      - "assets/**"
      - "buildozer.spec"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用社区维护的 buildozer action（kivy官方action不存在）
      # 参考: https://github.com/digreatbrian/buildozer-action
      - name: Build APK with Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: '3.10'
          buildozer-cmd: buildozer -v android debug

      # 上传产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: doushouqi-debug-apk
          path: bin/*.apk
          if-no-files-found: warn

      # 构建失败时也上传日志以便排查
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/
            *.log
          if-no-files-found: ignore
